<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Assets -->
    <link rel="icon" type="image/x-icon" href="assets/images/icon.ico">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        /* MAIN THEME VARIABLES */
        :root {
            --primary: #00c6ff;
            --secondary: #0072ff;
            --accent: #8a2be2;
            --dark: #0a0a0a;
            --darker: #000000;
            --light: #ffffff;
            --gray: #888888;
            --bg-gradient: linear-gradient(135deg, #000000, #001122);
        }

        body.light-mode {
            --primary: #4f46e5;
            --secondary: #3730a3;
            --accent: #7c3aed;
            --dark: #0f172a;
            --darker: #f8fafc;
            --light: #ffffff;
            --gray: #64748b;
            --bg-gradient: linear-gradient(135deg, #f8fafc, #e2e8f0, #f8fafc);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--darker);
            color: var(--light);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.3s ease;
        }

        body.light-mode {
            background-color: var(--darker);
            color: var(--dark);
        }

        /* BACKGROUND */
        .background {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: var(--bg-gradient);
        }

        .grid-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(0, 114, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 114, 255, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        body.light-mode .grid-overlay {
            background: linear-gradient(rgba(79, 70, 229, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(79, 70, 229, 0.05) 1px, transparent 1px);
        }

        /* Header & Navbar */
        .main-header {
            padding: 0.8rem 1.5rem;
            position: fixed;
            width: auto;
            top: 1rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            backdrop-filter: blur(20px);
            background: rgba(10, 10, 10, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.37);
        }

        body.light-mode .main-header {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            color: var(--light);
            text-decoration: none;
            font-weight: 500;
            position: relative;
        }

        body.light-mode .nav-links a {
            color: var(--dark);
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        /* Page Content */
        .page-hero {
            padding: 8rem 5% 3rem;
            text-align: center;
            max-width: 1000px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-subtitle {
            color: var(--gray);
            font-size: 1.1rem;
            margin-bottom: 3rem;
        }

        /* Award Grid */
        .award-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 3% 5rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2.5rem;
        }

        .award-item {
            background: rgba(30, 30, 40, 0.4);
            border: 1px solid rgba(0, 114, 255, 0.2);
            border-radius: 1.25rem;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.4s ease;
            backdrop-filter: blur(15px);
            position: relative;
        }

        .award-item:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0, 198, 255, 0.2);
        }

        body.light-mode .award-item {
            background: var(--light);
            border-color: rgba(0, 0, 0, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .award-image {
            height: 200px;
            width: 100%;
            object-fit: cover;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .award-content {
            padding: 1.5rem;
        }

        .award-title {
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
            color: var(--light);
        }

        body.light-mode .award-title {
            color: var(--dark);
        }

        .award-issuer {
            color: var(--primary);
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .award-date {
            color: var(--gray);
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: block;
        }

        .award-desc {
            color: var(--gray);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        /* Theme Toggle & Mobile */
        .theme-toggle {
            background: none;
            border: none;
            color: var(--light);
            font-size: 1.5rem;
            cursor: pointer;
            margin-left: 1rem;
        }

        body.light-mode .theme-toggle {
            color: var(--dark);
        }

        /* Footer */
        footer {
            background: rgba(10, 10, 10, 0.9);
            border-top: 1px solid rgba(0, 114, 255, 0.1);
            padding: 2rem 5%;
            margin-top: 4rem;
            text-align: center;
            color: var(--gray);
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .award-wrapper {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="background">
        <div class="grid-overlay"></div>
    </div>

    <header class="main-header">
        <div class="header-container">

                <i class="fas fa-terminal"></i>

    <section class="page-hero">

        <!-- Dynamic Content -->
        <p style="text-align:center; color: var(--gray); width: 100%;">Loading achievements...</p>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script> <!-- Adjust path as needed, assuming we put this in hero root -->

    <script>
        // Adjust Supabase config path if needed.
        // Typically it is in js/supabase-config.js relative to index.html
        // Since this file is award_achievment.html in hero/ (same as index.html), path is js/supabase-config.js
    </script>

    <script>
        // Theme Logic
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;
        const icon = themeToggle.querySelector('i');

        // Check local storage
        if (localStorage.getItem('theme') === 'light') {
            body.classList.add('light-mode');
            icon.classList.remove('fa-sun');
            icon.classList.add('fa-moon');
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('light-mode');
            const isLight = body.classList.contains('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');

            if (isLight) {
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
            } else {
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
            }
        });

        // Supabase Fetch
        async function fetchAwards() {
            const container = document.getElementById('award-list');
            try {
                if (typeof db === 'undefined' && typeof supabase !== 'undefined') {
                    // Re-init if config not loaded properly or conflict
                    // Usually credentials are in supabase-config.js
                }

                // Fallback hardcoded if DB fails or table missing (since I can't migrate)
                // But try DB first
                let data = [];
                let error = null;

                try {
                    const response = await db.from('awards').select('*').eq('is_published', true).order('date', { ascending: false });
                    data = response.data;
                    error = response.error;
                } catch (e) {
                    console.log("Table awards likely doesn't exist yet.");
                }

                if (!data || error) {
                    // Show placeholder if DB empty/error
                    container.innerHTML = `
                        <div class="award-item">
                            <div class="award-content">
                                <div class="award-title">CyberStreak CTF Winner</div>
                                <div class="award-issuer">CyberStreak</div>
                                <div class="award-date">Oct 2024</div>
                                <div class="award-desc">Secured 1st place in the national level Capture The Flag competition involving web exploitation and forensics.</div>
                            </div>
                        </div>
                        <div class="award-item">
                            <div class="award-content">
                                <div class="award-title">Hall of Fame - Bug Bounty</div>
                                <div class="award-issuer">HackerOne</div>
                                <div class="award-date">Aug 2024</div>
                                <div class="award-desc">Acknowledged for identifying critical vulnerabilities in a major tech giant's infrastructure.</div>
                            </div>
                        </div>
                     `;
                    return;
                }

                container.innerHTML = data.map(item => `
                    <div class="award-item">
                        ${item.image_url ? `<img src="${item.image_url}" class="award-image" alt="${item.title}">` : ''}
                        <div class="award-content">
                            <div class="award-title">${item.title}</div>
                            <div class="award-issuer">${item.issuer}</div>
                            <div class="award-date">${new Date(item.date).toLocaleDateString('en-US', { month: 'short', year: 'numeric' })}</div>
                            <div class="award-desc">${item.description}</div>
                        </div>
                    </div>
                `).join('');

            } catch (err) {
                console.error(err);
                container.innerHTML = '<p>Failed to load awards.</p>';
            }
        }

        fetchAwards();
    </script>
</body>
